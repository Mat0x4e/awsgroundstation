version: 0.2
phases:
  build:
    commands:
      - aws s3 cp s3://groundstation-noaa20-sdr-output-471112743408/contacts/2026/06/30/1ae80d1d-7c28-41c0-a032-1ee3e3e9f70b/chunks/chunk_0/rdr/RNSCA-RVIRS_j01_d20260630_t0956451_e1003519_b00001_c20260717141814195000_drlu_ops.h5 /tmp/viirs_rdr.h5
      - |
        /opt/SDR_4_1/libexec/python_runtime/bin/python3 -c "
        import h5py
        f = h5py.File('/tmp/viirs_rdr.h5', 'r')
        print('=== Top-level attrs ===')
        for k, v in sorted(f.attrs.items()):
            print(f'  {k} = {repr(v)}')
        print()
        dp = f['Data_Products']
        for grp_name in dp.keys():
            grp = dp[grp_name]
            print(f'=== Data_Products/{grp_name} attrs ===')
            for k, v in sorted(grp.attrs.items()):
                print(f'  {k} = {repr(v)}')
            # Check first granule attrs
            gran_keys = [k for k in grp.keys() if 'Gran_0' in k]
            if gran_keys:
                g0 = grp[gran_keys[0]]
                print(f'  --- {gran_keys[0]} attrs ---')
                for k, v in sorted(g0.attrs.items()):
                    print(f'    {k} = {repr(v)}')
            print()
        f.close()
        "
