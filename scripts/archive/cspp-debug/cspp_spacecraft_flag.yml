version: 0.2
phases:
  pre_build:
    commands:
      - aws s3 cp s3://groundstation-noaa20-sdr-output-471112743408/software/CSPP_SDR_V4.1_static_luts_j01.tar.gz /tmp/static_luts.tar.gz
      - tar xzf /tmp/static_luts.tar.gz -C /opt/
      - rm -f /tmp/static_luts.tar.gz
      - export CSPP_SDR_HOME=/opt/SDR_4_1
      - export CSPP_RT_HOME=/opt/SDR_4_1
      - cd /opt/SDR_4_1 && timeout 1200 ./bin/sdr_luts.sh 2>&1 | tail -5
      - aws s3 cp s3://groundstation-noaa20-sdr-output-471112743408/contacts/2026/06/30/1ae80d1d-7c28-41c0-a032-1ee3e3e9f70b/chunks/chunk_0/rdr/RNSCA-RVIRS_j01_d20260630_t0956451_e1003519_b00001_c20260717141814195000_drlu_ops.h5 /tmp/viirs_rdr.h5
  build:
    commands:
      - export CSPP_SDR_HOME=/opt/SDR_4_1
      - export CSPP_RT_HOME=/opt/SDR_4_1
      - rm -rf /tmp/sdr_work && mkdir -p /tmp/sdr_work && cd /tmp/sdr_work
      - echo "=== Try with --spacecraft j01 flag ==="
      - /opt/SDR_4_1/bin/viirs_sdr.sh --spacecraft j01 --work-dir /tmp/sdr_work /tmp/viirs_rdr.h5 2>&1 | tail -50
      - SDR_COUNT=$(find /tmp/sdr_work -name 'SV*.h5' -type f | wc -l)
      - GEO_COUNT=$(find /tmp/sdr_work -name 'G*.h5' -type f | wc -l)
      - echo "SDR=$SDR_COUNT GEO=$GEO_COUNT"
  post_build:
    commands:
      - SDR_COUNT=$(find /tmp/sdr_work -name 'SV*.h5' -type f | wc -l)
      - echo "FINAL SDR=$SDR_COUNT"
      - |
        if [ $SDR_COUNT -gt 0 ]; then
          echo "SUCCESS - UPLOADING"
          aws s3 sync /tmp/sdr_work/ s3://groundstation-noaa20-sdr-output-471112743408/contacts/2026/06/30/1ae80d1d-7c28-41c0-a032-1ee3e3e9f70b/chunks/chunk_0/sdr/ --exclude '*.log' --exclude '*.anc' --exclude 'db/*'
          echo "UPLOAD_DONE"
        else
          echo "STILL NO SDR FILES"
        fi
