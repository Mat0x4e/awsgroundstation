version: 0.2
phases:
  pre_build:
    commands:
      - echo "=== Install Satpy ==="
      - pip install satpy pyorbital pyresample dask trollsched 2>&1 | tail -5
      - echo "=== Download RDR ==="
      - mkdir -p /tmp/rdr
      - aws s3 cp s3://groundstation-noaa20-sdr-output-471112743408/contacts/2026/06/30/1ae80d1d-7c28-41c0-a032-1ee3e3e9f70b/chunks/chunk_0/rdr/RNSCA-RVIRS_j01_d20260630_t0956451_e1003519_b00001_c20260717141814195000_drlu_ops.h5 /tmp/rdr/
  build:
    commands:
      - echo "=== List available Satpy readers for VIIRS ==="
      - python3 -c "from satpy import available_readers; print([r for r in available_readers() if 'viirs' in r.lower()])"
      - echo "=== Try reading the RDR ==="
      - |
        python3 << 'PYEOF'
        from satpy import Scene
        import glob

        rdr_files = glob.glob('/tmp/rdr/*.h5')
        print(f"RDR files: {rdr_files}")

        # Try viirs_l1b reader first
        readers_to_try = ['viirs_l1b', 'viirs_sdr', 'viirs_compact']
        for reader in readers_to_try:
            print(f"\n=== Trying reader: {reader} ===")
            try:
                scn = Scene(filenames=rdr_files, reader=reader)
                avail = scn.available_dataset_names()
                print(f"Available datasets: {avail[:20]}")
                if avail:
                    # Try to load first dataset
                    scn.load([avail[0]])
                    ds = scn[avail[0]]
                    print(f"Loaded {avail[0]}: shape={ds.shape}, dtype={ds.dtype}")
                    if hasattr(ds, 'attrs') and 'area' in ds.attrs:
                        area = ds.attrs['area']
                        print(f"Area: {area}")
                    break
            except Exception as e:
                print(f"  Failed: {type(e).__name__}: {e}")

        print("\n=== Done ===")
        PYEOF
  post_build:
    commands:
      - echo "SATPY TEST COMPLETE"
